"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭─](fg:#6272a4)$os$username$hostname $directory$git_branch$git_status$python$cmd_duration
[╰─](fg:#6272a4)$character"""

add_newline = false

[os]
disabled = false
style = "fg:#bd93f9 bold"

[os.symbols]
Linux = " "
Macos = " "
Windows = " "

[username]
show_always = true
format = "[$user]($style)"
style_user = "fg:#8be9fd bold"
style_root = "fg:#ff5555 bold"

[hostname]
ssh_only = false
format = "[@$hostname](fg:#6272a4)"
trim_at = "."

[directory]
format = "[ $path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo = true
style = "fg:#bd93f9 bold"
read_only = " 󰌾 "
read_only_style = "fg:#ff5555"

[git_branch]
format = "[  $branch]($style)"
style = "fg:#50fa7b bold"
truncation_length = 24

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "fg:#f1fa8c"
conflicted = "[ ](fg:#ff5555)"
ahead = "[⇡${count}](fg:#8be9fd)"
behind = "[⇣${count}](fg:#ffb86c)"
diverged = "[⇕](fg:#ff5555)"
modified = "[~${count}](fg:#ffb86c)"
untracked = "[?${count}](fg:#6272a4)"
staged = "[+${count}](fg:#50fa7b)"
deleted = "[-${count}](fg:#ff5555)"

[python]
format = "[ $symbol$version( \\($virtualenv\\))]($style)"
symbol = " "
style = "fg:#f1fa8c"
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "*.py", "uv.lock"]

[cmd_duration]
min_time = 2000
format = "[ 󱦟 $duration]($style)"
style = "fg:#6272a4"

[character]
success_symbol = "[❯](fg:#50fa7b bold)"
error_symbol = "[❯](fg:#ff5555 bold)"
vimcmd_symbol = "[❮](fg:#bd93f9 bold)"

# Disabled modules
[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[docker_context]
disabled = true
